<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#92400e"/>

  <!-- Cake base (bottom tier) -->
  <rect x="10" y="40" width="44" height="14" rx="4" fill="#fef3c7"/>
  <rect x="10" y="40" width="44" height="4" rx="2" fill="#fde68a"/>

  <!-- Cake middle tier -->
  <rect x="15" y="28" width="34" height="14" rx="4" fill="#fef3c7"/>
  <rect x="15" y="28" width="34" height="4" rx="2" fill="#fde68a"/>

  <!-- Cake top tier -->
  <rect x="21" y="18" width="22" height="12" rx="4" fill="#fef3c7"/>
  <rect x="21" y="18" width="22" height="4" rx="2" fill="#fde68a"/>

  <!-- Frosting drips on bottom tier -->
  <path d="M14 40 Q17 36 20 40 Q23 36 26 40 Q29 36 32 40 Q35 36 38 40 Q41 36 44 40 Q47 36 50 40" stroke="#f59e0b" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Frosting drips on middle tier -->
  <path d="M18 28 Q21 24 24 28 Q27 24 30 28 Q33 24 36 28 Q39 24 42 28 Q45 24 46 28" stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Candles -->
  <rect x="27" y="11" width="4" height="8" rx="2" fill="#f87171"/>
  <rect x="33" y="11" width="4" height="8" rx="2" fill="#60a5fa"/>

  <!-- Flames -->
  <ellipse cx="29" cy="10" rx="2" ry="3" fill="#fbbf24"/>
  <ellipse cx="35" cy="10" rx="2" ry="3" fill="#fbbf24"/>
  <ellipse cx="29" cy="9.5" rx="1" ry="1.5" fill="#fff7ed"/>
  <ellipse cx="35" cy="9.5" rx="1" ry="1.5" fill="#fff7ed"/>

  <!-- Decorative dots on bottom tier -->
  <circle cx="20" cy="47" r="2" fill="#f59e0b"/>
  <circle cx="32" cy="47" r="2" fill="#f59e0b"/>
  <circle cx="44" cy="47" r="2" fill="#f59e0b"/>

  <!-- Decorative dots on middle tier -->
  <circle cx="25" cy="35" r="1.5" fill="#d97706"/>
  <circle cx="32" cy="35" r="1.5" fill="#d97706"/>
  <circle cx="39" cy="35" r="1.5" fill="#d97706"/>
</svg>
